<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0a0f">
<title>SOUNDBOARD</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&display=swap');

  :root {
    --bg:       #0a0a0f;
    --surface:  #13131a;
    --border:   #1e1e2e;
    --accent:   #00ffaa;
    --accent2:  #ff3366;
    --accent3:  #7c6bff;
    --text:     #e0e0e0;
    --muted:    #555577;
    --playing:  #00ffaa;
    --glow:     0 0 20px rgba(0,255,170,0.35);
    --glow2:    0 0 20px rgba(255,51,102,0.4);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    overflow-x: hidden;
  }

  /* ── scanline overlay ── */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 999; pointer-events: none;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.04) 2px,
      rgba(0,0,0,0.04) 4px
    );
  }

  /* ── noise texture ── */
  body::after {
    content: '';
    position: fixed; inset: 0; z-index: 998; pointer-events: none; opacity: 0.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
    background-repeat: repeat;
    background-size: 128px;
  }

  /* ── layout ── */
  #app {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 0 0 env(safe-area-inset-bottom, 16px);
  }

  /* ── header ── */
  header {
    position: sticky; top: 0; z-index: 100;
    background: linear-gradient(180deg, var(--bg) 80%, transparent);
    padding: 16px 16px 8px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .header-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(28px, 8vw, 42px);
    letter-spacing: 0.08em;
    color: var(--accent);
    text-shadow: 0 0 30px rgba(0,255,170,0.5), 0 0 60px rgba(0,255,170,0.2);
    line-height: 1;
    user-select: none;
  }

  .status-pill {
    display: flex; align-items: center; gap: 6px;
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid var(--border);
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    transition: all 0.3s;
    white-space: nowrap;
  }
  .status-pill.connected {
    border-color: var(--accent);
    color: var(--accent);
    box-shadow: 0 0 10px rgba(0,255,170,0.2);
  }
  .status-pill .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: currentColor;
    animation: none;
  }
  .status-pill.connected .dot { animation: pulse-dot 1.5s infinite; }
  @keyframes pulse-dot {
    0%,100% { opacity: 1; } 50% { opacity: 0.3; }
  }

  /* ── controls bar ── */
  .controls {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  /* MIC TOGGLE */
  .mic-toggle {
    flex: 1;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    padding: 10px 14px;
    border-radius: 8px;
    border: 2px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .mic-toggle:active { transform: scale(0.97); }
  .mic-toggle.active {
    border-color: var(--accent2);
    color: var(--accent2);
    background: rgba(255,51,102,0.08);
    box-shadow: var(--glow2), inset 0 0 20px rgba(255,51,102,0.05);
  }
  .mic-toggle .mic-icon {
    font-size: 16px;
    transition: transform 0.2s;
  }
  .mic-toggle.active .mic-icon { transform: scale(1.2); }

  /* waveform animation when mic is on */
  .mic-wave {
    display: none;
    gap: 2px; align-items: center; height: 14px;
  }
  .mic-toggle.active .mic-wave { display: flex; }
  .mic-toggle.active .mic-icon-static { display: none; }
  .mic-wave span {
    display: block;
    width: 2px;
    background: var(--accent2);
    border-radius: 1px;
    animation: wave-bar 0.8s ease-in-out infinite;
  }
  .mic-wave span:nth-child(1) { height: 4px; animation-delay: 0s; }
  .mic-wave span:nth-child(2) { height: 10px; animation-delay: 0.15s; }
  .mic-wave span:nth-child(3) { height: 7px; animation-delay: 0.3s; }
  .mic-wave span:nth-child(4) { height: 12px; animation-delay: 0.1s; }
  .mic-wave span:nth-child(5) { height: 5px; animation-delay: 0.25s; }
  @keyframes wave-bar {
    0%,100% { transform: scaleY(1); } 50% { transform: scaleY(0.3); }
  }

  /* STOP button */
  .stop-btn {
    padding: 10px 14px;
    border-radius: 8px;
    border: 2px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 18px;
    cursor: pointer;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
    line-height: 1;
  }
  .stop-btn:active { transform: scale(0.95); }
  .stop-btn.lit {
    border-color: var(--accent3);
    color: var(--accent3);
    box-shadow: 0 0 14px rgba(124,107,255,0.4);
  }

  /* reload button */
  .reload-btn {
    padding: 10px 12px;
    border-radius: 8px;
    border: 2px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-size: 16px;
    cursor: pointer;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
    line-height: 1;
  }
  .reload-btn:active { transform: rotate(180deg) scale(0.9); }

  /* ── now playing bar ── */
  #now-playing {
    font-size: 10px;
    letter-spacing: 0.08em;
    color: var(--muted);
    text-transform: uppercase;
    min-height: 14px;
    transition: color 0.3s;
    padding: 0 2px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  #now-playing.active { color: var(--accent); }

  /* ── sound groups ── */
  #grid {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 0;
    padding: 4px 0 24px;
  }

  .group-section {
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .group-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 18px 16px 10px;
    cursor: pointer;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  .group-header-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(15px, 4vw, 20px);
    letter-spacing: 0.12em;
    color: var(--accent3);
    text-shadow: 0 0 12px rgba(124,107,255,0.4);
    flex: 1;
  }

  .group-count {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.08em;
  }

  .group-chevron {
    font-size: 11px;
    color: var(--muted);
    transition: transform 0.25s;
  }
  .group-section.collapsed .group-chevron { transform: rotate(-90deg); }

  .group-divider {
    height: 1px;
    background: var(--border);
    margin: 0 16px;
    opacity: 0.6;
  }

  .group-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    padding: 10px 16px 8px;
    overflow: hidden;
    transition: max-height 0.3s ease, opacity 0.3s ease;
    max-height: 9999px;
    opacity: 1;
  }
  .group-section.collapsed .group-grid {
    max-height: 0;
    opacity: 0;
    padding-top: 0;
    padding-bottom: 0;
  }

  @media (min-width: 500px) { .group-grid { grid-template-columns: repeat(3, 1fr); } }
  @media (min-width: 700px) { .group-grid { grid-template-columns: repeat(4, 1fr); } }

  /* ── sound button ── */
  .sound-btn {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 16px 8px;
    min-height: 90px;
    border-radius: 10px;
    border: 2px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    text-align: center;
    word-break: break-word;
    overflow: hidden;
    cursor: pointer;
    transition: border-color 0.15s, box-shadow 0.15s, transform 0.1s, background 0.15s;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  .sound-btn .icon {
    font-size: 22px;
    line-height: 1;
    transition: transform 0.2s;
  }

  .sound-btn .label {
    line-height: 1.3;
    max-width: 100%;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
  }

  /* ripple on tap */
  .sound-btn::after {
    content: '';
    position: absolute; inset: 0; border-radius: inherit;
    background: radial-gradient(circle at center, rgba(0,255,170,0.15) 0%, transparent 70%);
    opacity: 0;
    transition: opacity 0.4s;
  }

  .sound-btn:active {
    transform: scale(0.95);
  }
  .sound-btn:active::after { opacity: 1; transition: none; }

  .sound-btn.playing {
    border-color: var(--accent);
    background: rgba(0,255,170,0.06);
    box-shadow: var(--glow), inset 0 0 30px rgba(0,255,170,0.04);
    color: var(--accent);
  }
  .sound-btn.playing .icon { transform: scale(1.15); }

  /* progress bar at bottom of playing button */
  .sound-btn .progress-bar {
    position: absolute;
    bottom: 0; left: 0;
    height: 3px;
    width: 0%;
    background: var(--accent);
    border-radius: 0 0 8px 8px;
    box-shadow: 0 0 8px var(--accent);
    transition: none;
  }
  .sound-btn.playing .progress-bar {
    animation: progress-indeterminate 2s linear infinite;
    width: 100%;
  }
  @keyframes progress-indeterminate {
    0%   { clip-path: inset(0 100% 0 0); }
    50%  { clip-path: inset(0 0 0 0); }
    100% { clip-path: inset(0 0 0 100%); }
  }

  /* ── empty state ── */
  #empty {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 60px 32px;
    gap: 16px;
    color: var(--muted);
    grid-column: 1 / -1;
  }
  #empty .big { font-size: 48px; }
  #empty h2 { font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 0.1em; }
  #empty p  { font-size: 11px; line-height: 1.7; }

  /* ── connecting overlay ── */
  #overlay {
    position: fixed; inset: 0; z-index: 200;
    background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 20px;
    transition: opacity 0.5s;
  }
  #overlay.hidden { opacity: 0; pointer-events: none; }
  #overlay h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px; letter-spacing: 0.1em;
    color: var(--muted);
  }
  .spinner {
    width: 44px; height: 44px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #overlay p { font-size: 11px; color: var(--muted); letter-spacing: 0.06em; }
</style>
</head>
<body>

<div id="overlay">
  <div class="spinner"></div>
  <h2>Connecting…</h2>
  <p>Make sure the server is running on your PC</p>
</div>

<div id="app">
  <header>
    <div class="header-row">
      <h1>SOUNDBOARD</h1>
      <div id="status" class="status-pill">
        <span class="dot"></span>
        <span id="status-text">connecting</span>
      </div>
    </div>

    <div class="controls">
      <button class="mic-toggle" id="mic-btn" onclick="toggleMic()">
        <span class="mic-icon-static">🎙️</span>
        <div class="mic-wave" aria-hidden="true">
          <span></span><span></span><span></span><span></span><span></span>
        </div>
        <span id="mic-label">MIC OFF</span>
      </button>

      <button class="stop-btn" id="stop-btn" onclick="stopAll()" title="Stop current sound">⏹</button>
      <button class="reload-btn" onclick="reloadSounds()" title="Reload sounds">↻</button>
    </div>

    <div id="now-playing">NO SOUND PLAYING</div>
  </header>

  <div id="grid"></div>
</div>

<script>
  // ── WebSocket ──────────────────────────────────────────────────────────────
  let ws = null;
  let reconnectTimer = null;
  let reconnectDelay = 2000;
  let micEnabled  = false;
  let playingFile = null;

  const overlay    = document.getElementById('overlay');
  const statusEl   = document.getElementById('status');
  const statusText = document.getElementById('status-text');
  const nowPlaying = document.getElementById('now-playing');
  const grid       = document.getElementById('grid');
  const micBtn     = document.getElementById('mic-btn');
  const stopBtn    = document.getElementById('stop-btn');

  function connect() {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    ws = new WebSocket(`${proto}://${location.host}/ws`);

    ws.onopen = () => {
      clearTimeout(reconnectTimer);
      reconnectDelay = 2000; // reset backoff on success
      setStatus(true);
      overlay.classList.add('hidden');
    };

    ws.onmessage = e => {
      try {
        const msg = JSON.parse(e.data);
        if (msg.type === 'init') {
          renderGrid(msg.groups || msg.sounds);
          setMic(msg.micEnabled);
        } else if (msg.type === 'playing') {
          setPlaying(msg.file);
        } else if (msg.type === 'stopped') {
          setPlaying(null);
        } else if (msg.type === 'mic') {
          setMic(msg.enabled);
        }
      } catch (_) {}
    };

    ws.onclose = ws.onerror = () => {
      setStatus(false);
      reconnectDelay = Math.min(reconnectDelay * 2, 30000);
      reconnectTimer = setTimeout(() => {
        // Don't reconnect if page is hidden (saves server from background tab spam)
        if (document.visibilityState === 'hidden') {
          document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') connect();
          }, { once: true });
        } else {
          connect();
        }
      }, reconnectDelay);
    };
  }

  function send(obj) {
    if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(obj));
  }

  function setStatus(connected) {
    statusEl.classList.toggle('connected', connected);
    statusText.textContent = connected ? 'connected' : 'offline';
  }

  // ── Render grid ────────────────────────────────────────────────────────────
  const ICONS = ['🔊','🎵','🎶','🥁','🎸','🎹','🎺','🎻','🎤','🔔','💥','🌟','🚨','👏','🎉','⚡','🔥','❄️','💣','🎮'];

  function iconFor(name) {
    let h = 0;
    for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) >>> 0;
    return ICONS[h % ICONS.length];
  }

  function renderGrid(groups) {
    grid.innerHTML = '';

    // Support legacy flat 'sounds' array from older server versions
    if (Array.isArray(groups) && typeof groups[0] === 'string') {
      groups = [{ name: 'MISC', files: groups }];
    }

    if (!groups || groups.length === 0 || groups.every(g => g.files.length === 0)) {
      const empty = document.createElement('div');
      empty.id = 'empty';
      empty.innerHTML = `
        <div class="big">📂</div>
        <h2>No Sounds Found</h2>
        <p>Drop audio files into the <strong>sounds/</strong> folder<br>next to server.js and reload.</p>
      `;
      empty.style.display = 'flex';
      grid.appendChild(empty);
      return;
    }

    groups.forEach(group => {
      if (!group.files || group.files.length === 0) return;

      const section = document.createElement('div');
      section.className = 'group-section';
      section.dataset.group = group.name;

      // Header (clickable to collapse/expand)
      const header = document.createElement('div');
      header.className = 'group-header';
      header.innerHTML = `
        <span class="group-header-label">${escHtml(group.name)}</span>
        <span class="group-count">${group.files.length}</span>
        <span class="group-chevron">▼</span>
      `;
      header.addEventListener('click', () => section.classList.toggle('collapsed'));
      section.appendChild(header);

      // Divider
      const divider = document.createElement('div');
      divider.className = 'group-divider';
      section.appendChild(divider);

      // Button grid
      const groupGrid = document.createElement('div');
      groupGrid.className = 'group-grid';

      group.files.forEach(file => {
        const btn = document.createElement('button');
        btn.className = 'sound-btn';
        btn.dataset.file = file;

        // Display name: strip directory prefix and extension
        const basename = file.includes('/') ? file.split('/').pop() : file;
        const name = basename.replace(/\.[^.]+$/, '');

        btn.innerHTML = `
          <span class="icon">${iconFor(name)}</span>
          <span class="label">${escHtml(name)}</span>
          <div class="progress-bar"></div>
        `;

        btn.addEventListener('click', () => playSound(file));
        btn.addEventListener('touchstart', () => {}, { passive: true });

        if (file === playingFile) btn.classList.add('playing');

        groupGrid.appendChild(btn);
      });

      section.appendChild(groupGrid);
      grid.appendChild(section);
    });
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── Actions ────────────────────────────────────────────────────────────────
  function playSound(file) {
    send({ type: 'play', file });
    // Optimistic update
    setPlaying(file);
    // Also fire HTTP as fallback (for when WS drops momentarily)
    fetch('/api/play', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ file })
    }).catch(() => {});
  }

  function stopAll() {
    send({ type: 'stop' });
    fetch('/api/stop', { method: 'POST' }).catch(() => {});
    setPlaying(null);
  }

  function toggleMic() {
    send({ type: 'mic', enabled: !micEnabled });
    fetch('/api/mic', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ enabled: !micEnabled })
    }).catch(() => {});
  }

  function reloadSounds() {
    send({ type: 'reload' });
  }

  // ── State updates ─────────────────────────────────────────────────────────
  function setPlaying(file) {
    playingFile = file;
    // update buttons
    document.querySelectorAll('.sound-btn').forEach(btn => {
      btn.classList.toggle('playing', btn.dataset.file === file);
    });
    // update now-playing bar
    if (file) {
      const basename = file.includes('/') ? file.split('/').pop() : file;
      const name = basename.replace(/\.[^.]+$/, '');
      nowPlaying.textContent = '▶ ' + name;
      nowPlaying.classList.add('active');
      stopBtn.classList.add('lit');
    } else {
      nowPlaying.textContent = 'NO SOUND PLAYING';
      nowPlaying.classList.remove('active');
      stopBtn.classList.remove('lit');
    }
  }

  function setMic(enabled) {
    micEnabled = enabled;
    micBtn.classList.toggle('active', enabled);
    document.getElementById('mic-label').textContent = enabled ? 'MIC ON' : 'MIC OFF';
  }

  // ── Boot ───────────────────────────────────────────────────────────────────
  connect();
</script>
</body>
</html>
